<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloraAero - Galeria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="pagina-galeria">

    <header class="topo">
        <img src="img/hibisco.png" alt="Logo Hibisco" class="topo-logo" />
        <h1>Galeria</h1>
    </header>

    <div class="voltar-container">
        <a class="voltar" href="index.html" aria-label="Voltar para a página inicial">
            <img src="img/botao-home.png" alt="" class="btn-galeria" />
            <span class="texto-voltar">Home</span>
        </a>
    </div>

    <main class="conteudo-galeria">

        <section class="galeria-grade" id="grade-fotos" aria-label="Grade de fotos da flora"></section>

        <nav class="navegacao" aria-label="Navegação entre páginas">
            <a href="#" id="btn-voltar-pagina" aria-label="Ir para a página anterior">
                <img src="img/botao-esquerda.png" alt="Seta Esquerda" class="btn-navegação" />
            </a>
            <a href="#" id="btn-proxima-pagina" aria-label="Ir para a próxima página">
                <img src="img/botao-direita.png" alt="Seta Direita" class="btn-navegação" />
            </a>
        </nav>

    </main>

    <script src="js/dados.js"></script>
    <script src="js/galeria.js"></script>
</body>

</html>
