<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloraAero - Bem-vindo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap">

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <main class="home">
        <div class="layout-grid">

            <div class="coluna-esq">

                <div class="logo-container">

                </div>

                <div class="sobre-container">
                    <p>Ou conheça sobre nós<br>clicando no botão abaixo!</p>
                    <a href="sobre.html">
                        <img src="img/botao-ixora.png" alt="Ícone da galeria" class="btn-home" />
                    </a>
                </div>

            </div>

            <div class="coluna-dir">

                <div class="texto-boas-vindas">
                    <h2>Bem-vindo a FloraAero</h2>
                    <p>
                        Conecte-se com a pureza e a vibração do
                        <br>mundo natural através do seu olhar.
                    </p>

                        Explore o nosso ecossistema através de duas
                        <br>experiências principais, visite nossa galeria
                        <br>clicando no botão abaixo!
                    </p>
                </div>

                <div class="galeria-container">
                    <a href="galeria.html">
                        <img src="img/botao-galeria.png" alt="Ícone de galeria" class="btn-home" />
